<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cytoscape Graph</title>
    <!-- Cytoscape.js の読み込み -->
    <script src="cytoscape.min.js"></script>
    <style>
        /* 画面全体にグラフを表示する設定 */
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        #cy {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>

<body>

    <!-- グラフが描画されるコンテナ -->
    <div id="cy"></div>

    <!-- Pythonから出力した設定ファイルの読み込み -->
    <script src="graph_config.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const config = cytoscapeConfig || {};
            const configProps = config.props || {};

            // 1. エレメント（ノード・エッジ）のクラス名（スペース区切り）をJSが認識できる配列に変換
            let rawElements = configProps.elements || config.elements || [];
            let convertedElements = rawElements.map(item => {
                if (item.classes && typeof item.classes === 'string') {
                    // "edge tt25" を ["edge", "tt25"] のように配列に分解
                    item.classes = item.classes.trim().split(/\s+/);
                }
                return item;
            });

            // 2. スタイルシートの抽出（propsの中、または直下の両方に対応）
            let rawStylesheet = configProps.stylesheet || config.stylesheet || [];
            let convertedStylesheet = [];

            if (Array.isArray(rawStylesheet)) {
                convertedStylesheet = rawStylesheet.map(item => {
                    let rawStyle = item.style || item.css || {};

                    // 文字列（JSON）になっていた場合はオブジェクトにパース
                    if (typeof rawStyle === 'string') {
                        try { rawStyle = JSON.parse(rawStyle); } catch (e) { rawStyle = {}; }
                    }

                    const finalStyle = {};
                    Object.keys(rawStyle).forEach(key => {
                        // キャメルケースをケバブケースに変換 (curveStyle -> curve-style)
                        let kebabKey = key.replace(/([A-Z])/g, "-$1").toLowerCase();

                        // Dashの content を JSの label に変換（文字化けのないようそのまま渡す）
                        if (kebabKey === 'content') kebabKey = 'label';

                        finalStyle[kebabKey] = rawStyle[key];
                    });

                    return {
                        selector: item.selector,
                        style: finalStyle
                    };
                });
            }

            // 3. グラフの描画を実行
            cytoscape({
                container: document.getElementById('cy'),
                elements: convertedElements,       // クラス名を最適化したエレメント
                stylesheet: convertedStylesheet,   // パース完了したスタイル
                layout: {
                    name: 'preset'                 // Python側の座標(position)を完全固定
                },
                zoomingEnabled: true,
                userZoomingEnabled: true,
                panningEnabled: true,
                userPanningEnabled: true,
                boxSelectionEnabled: false,
                autounselectify: true
            });
        });
    </script>
</body>

</html>
