<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cytoscape グラフ表示</title>
    <style>
        /* 画面いっぱいにグラフを表示する設定 */
        html,
        body,
        #cy {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
    </style>
</head>

<body>

    <!-- グラフを表示する枠 -->
    <div id="cy"></div>

    <!-- 1. Cytoscape.js の本体ライブラリを確実に読み込む（公式CDNに変更） -->
    <script src="cytoscape.min.js"></script>

    <!-- 2. あなたの設定ファイルを読み込む -->
    <script src="graph_config.js"></script>

    <script>
        window.addEventListener('load', () => {
            if (typeof cytoscape === 'undefined') return;

            if (typeof cytoscapeConfig !== 'undefined') {
                console.log("元の設定データ:", cytoscapeConfig);

                // 💡 配列（Array）の1番目、またはデータの中から elements を確実に救出する
                let rawElements = [];

                if (Array.isArray(cytoscapeConfig)) {
                    // 配列の場合：1番目の要素（cytoscapeConfig[0]）にelementsが入っているケースがほとんどです
                    rawElements = cytoscapeConfig[0].elements || cytoscapeConfig[0] || [];
                } else {
                    // オブジェクトの場合
                    rawElements = cytoscapeConfig.elements || (cytoscapeConfig.props && cytoscapeConfig.props.elements) || [];
                }

                // もし救出したデータがまだオブジェクトの中に隠れていたら、さらに一段剥く
                if (rawElements.elements) {
                    rawElements = rawElements.elements;
                }

                // 🎨 JavaScript側で見た目（スタイル）を綺麗に定義し直す
                const defaultStylesheet = [
                    {
                        selector: 'node',
                        style: {
                            'background-color': '#0074D9',
                            'label': 'data(label)', // 家系図の名前（ラベル）を表示
                            'color': '#000000',
                            'width': '40px',
                            'height': '40px',
                            'font-size': '12px',
                            'text-valign': 'center',
                            'text-halign': 'center', // ⚠️ panel から center に修正してエラーを解消
                            'background-opacity': 0.8,
                            'border-width': 2,
                            'border-color': '#0056b3'
                        }
                    },
                    {
                        selector: 'edge',
                        style: {
                            'width': 2,
                            'line-color': '#999',
                            'target-arrow-color': '#999',
                            'target-arrow-shape': 'triangle', // 親から子への矢印
                            'curve-style': 'bezier'
                        }
                    }
                ];

                // 🏗️ Cytoscapeが動く形にデータを組み立て直す
                const cleanConfig = {
                    container: document.getElementById('cy'),
                    elements: rawElements,
                    style: defaultStylesheet,
                    layout: {
                        name: 'cose', // 自動できれいに家系図を分散・整理して配置するレイアウト
                        animate: false
                    }
                };

                // グラフを描画
                const cy = cytoscape(cleanConfig);

                // 画面中央にピタッと収める
                cy.fit();
                cy.center();

                console.log("クリーンアップ後の描画を実行しました。要素数:", cy.elements().length);

                window.addEventListener('resize', () => {
                    cy.resize();
                    cy.fit();
                });
            }
        });
    </script>

</body>

</html>
