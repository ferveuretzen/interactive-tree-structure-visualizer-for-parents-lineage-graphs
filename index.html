<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cytoscape グラフ表示</title>
    <style>
        /* 画面いっぱいにグラフを表示する設定 */
        html,
        body,
        #cy {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
    </style>
</head>

<body>

    <!-- グラフを表示する枠 -->
    <div id="cy"></div>

    <!-- 1. Cytoscape.js の本体ライブラリを確実に読み込む（公式CDNに変更） -->
    <script src="cytoscape.min.js"></script>

    <!-- 2. あなたの設定ファイルを読み込む -->
    <script src="graph_config.js"></script>

    <script>
        window.addEventListener('load', () => {
            if (typeof cytoscape === 'undefined') return;

            if (typeof cytoscapeConfig !== 'undefined') {
                console.log("元の設定データ:", cytoscapeConfig);

                // 💡 Dashのダンプデータから、純粋なノードと線のデータを救出する
                // データの階層（propsの中など）に合わせて自動で探索します
                const rawElements = cytoscapeConfig.elements ||
                    (cytoscapeConfig.props && cytoscapeConfig.props.elements) ||
                    cytoscapeConfig.data || [];

                // 🎨 JavaScript側で、見た目（スタイル）を強制的に再定義する
                // （点の色を青、文字を黒、線をグレーに設定）
                const defaultStylesheet = [
                    {
                        selector: 'node',
                        style: {
                            'background-color': '#0074D9',
                            'label': 'data(label)', // ノードに文字を表示
                            'color': '#000000',
                            'width': '30px',
                            'height': '30px',
                            'font-size': '12px',
                            'text-valign': 'center',
                            'text-halign': 'panel'
                        }
                    },
                    {
                        selector: 'edge',
                        style: {
                            'width': 2,
                            'line-color': '#999',
                            'target-arrow-color': '#999',
                            'target-arrow-shape': 'triangle',
                            'curve-style': 'bezier'
                        }
                    }
                ];

                // 🏗️ Cytoscapeが動く形にデータを組み立て直す
                const cleanConfig = {
                    container: document.getElementById('cy'),
                    elements: rawElements,
                    style: defaultStylesheet, // 壊れたスタイルの代わりに上記を適用
                    layout: {
                        name: 'cose', // 自動で綺麗に分散配置するレイアウト
                        animate: false
                    }
                };

                // グラフを描画
                const cy = cytoscape(cleanConfig);
                cy.fit();

                console.log("クリーンアップ後の描画を実行しました。要素数:", cy.elements().length);

                if (cy.elements().length === 0) {
                    console.error("エラー: ノードや線のデータ（elements）が見つかりませんでした。データ構造の確認が必要です。");
                }

                window.addEventListener('resize', () => { cy.fit(); });
            }
        });
    </script>

</body>

</html>
