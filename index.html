<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cytoscape Graph</title>
    <!-- Cytoscape.js の読み込み -->
    <script src="cytoscape.min.js"></script>
    <style>
        /* 画面全体にグラフを表示する設定 */
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        #cy {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>

<body>

    <!-- グラフが描画されるコンテナ -->
    <div id="cy"></div>

    <!-- Pythonから出力した設定ファイルの読み込み -->
    <script src="graph_config.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const configProps = cytoscapeConfig.props || {};

            // Dash Cytoscape のスタイルシートを JS（Cytoscape.js）形式に徹底変換
            let convertedStylesheet = [];
            if (Array.isArray(configProps.stylesheet)) {
                convertedStylesheet = configProps.stylesheet.map(item => {
                    // Python側の style または css の中身を取得
                    const rawStyle = item.style || item.css || {};
                    const finalStyle = {};

                    // キー名のズレ（キャメルケースからケバブケースへの変換など）を補正
                    Object.keys(rawStyle).forEach(key => {
                        // JavaScriptのキャメルケース（curveStyle）をCSSのケバブケース（curve-style）に変換
                        let kebabKey = key.replace(/([A-Z])/g, "-$1").toLowerCase();

                        // 特殊なキーの変換（content -> label など、DashとJSの差異を吸収）
                        if (kebabKey === 'content') kebabKey = 'label';

                        finalStyle[kebabKey] = rawStyle[key];
                    });

                    return {
                        selector: item.selector,
                        style: finalStyle
                    };
                });
            }

            // グラフの描画を実行
            cytoscape({
                container: document.getElementById('cy'),
                elements: configProps.elements || [],
                stylesheet: convertedStylesheet, // 変換後の強力なスタイルシートを適用
                layout: {
                    name: 'preset'
                },
                zoomingEnabled: true,
                userZoomingEnabled: true,
                panningEnabled: true,
                userPanningEnabled: true,
                boxSelectionEnabled: false,
                autounselectify: true
            });
        });
    </script>
</body>

</html>
