<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cytoscape Graph</title>
    <!-- 対策1で保存したローカルファイルを読み込み -->
    <script src="cytoscape.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #ffffff;
        }

        #cy {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>

<body>

    <div id="cy"></div>
    <script src="graph_config.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const config = cytoscapeConfig || {};
            const configProps = config.props || {};

            // 1. エレメント（ノード・エッジ）の抽出
            let rawElements = configProps.elements || config.elements || [];

            // 2. スタイルシートの抽出と、純粋なJavaScriptオブジェクトへの完全変換
            let rawStylesheet = configProps.stylesheet || config.stylesheet || [];
            let convertedStylesheet = [];

            if (Array.isArray(rawStylesheet)) {
                convertedStylesheet = rawStylesheet.map(item => {
                    // Python（Dash）が出力した内部のstyleオブジェクトを取得
                    let dashStyle = item.style || item.css || {};

                    // 万が一文字列だった場合のデコード処理
                    if (typeof dashStyle === 'string') {
                        try { dashStyle = JSON.parse(dashStyle); } catch (e) { dashStyle = {}; }
                    }

                    const finalStyle = {};
                    Object.keys(dashStyle).forEach(key => {
                        // キャメルケースをケバブケースに変換 (curveStyle -> curve-style)
                        let kebabKey = key.replace(/([A-Z])/g, "-$1").toLowerCase();

                        // Dash特有の「content」を、本家JSが認識できる「label」に強制変換
                        if (kebabKey === 'content') kebabKey = 'label';

                        finalStyle[kebabKey] = dashStyle[key];
                    });

                    // 複数クラス（例: ".edge tt25"）をJS版が認識できるようにドット繋ぎに補正
                    let cleanSelector = item.selector.trim().replace(/\s+/g, '.');

                    return {
                        selector: cleanSelector,
                        style: finalStyle
                    };
                });
            }

            // 3. グラフの描画を実行
            const cy = cytoscape({
                container: document.getElementById('cy'),
                elements: rawElements,
                stylesheet: convertedStylesheet, // 完全に補正されたスタイル
                layout: {
                    name: 'preset'  // Python側の座標(position)をそのまま使用
                },
                zoomingEnabled: true,
                userZoomingEnabled: true,
                panningEnabled: true,
                userPanningEnabled: true,
                boxSelectionEnabled: false,
                autounselectify: true
            });

            // 4. 初期表示時に全体が綺麗に画面に収まるようズームを自動調整
            cy.fit(50);
        });
    </script>
