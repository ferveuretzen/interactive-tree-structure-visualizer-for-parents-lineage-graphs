<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cytoscape Graph</title>
    <!-- Cytoscape.js の読み込み -->
    <script src="cytoscape.min.js"></script>
    <style>
        /* 画面全体にグラフを表示する設定 */
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        #cy {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>

<body>

    <!-- グラフが描画されるコンテナ -->
    <div id="cy"></div>

    <!-- Pythonから出力した設定ファイルの読み込み -->
    <script src="graph_config.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const config = cytoscapeConfig || {};
            const configProps = config.props || {};

            // 1. エレメントデータの抽出
            let rawElements = configProps.elements || config.elements || [];

            // 2. スタイルシートの抽出と、JavaScript（本家）向けへの最適化
            let rawStylesheet = configProps.stylesheet || config.stylesheet || [];
            let convertedStylesheet = [];

            if (Array.isArray(rawStylesheet)) {
                convertedStylesheet = rawStylesheet.map(item => {
                    let rawStyle = item.style || item.css || {};
                    const finalStyle = {};

                    Object.keys(rawStyle).forEach(key => {
                        let kebabKey = key.replace(/([A-Z])/g, "-$1").toLowerCase();

                        // Dashの content を JSの label に変換
                        if (kebabKey === 'content') kebabKey = 'label';

                        finalStyle[kebabKey] = rawStyle[key];
                    });

                    // 【最重要】"edge tt25" のような複数クラス指定（.edge.tt25）でも、
                    // JavaScript側が確実に認識できるようにセレクタのスペースをドットに置換します
                    let cleanSelector = item.selector;
                    if (cleanSelector.startsWith('.')) {
                        // 空白区切りをドット区切りに変換（例: ".edge tt25" -> ".edge.tt25"）
                        cleanSelector = cleanSelector.trim().replace(/\s+/g, '.');
                    }

                    return {
                        selector: cleanSelector,
                        style: finalStyle
                    };
                });
            }

            // 3. グラフの描画を実行
            cytoscape({
                container: document.getElementById('cy'),
                elements: rawElements,              // データをそのまま流し込む
                stylesheet: convertedStylesheet,   // セレクタを最適化したスタイル
                layout: {
                    name: 'preset'                 // 位置座標を完全固定
                },
                zoomingEnabled: true,
                userZoomingEnabled: true,
                panningEnabled: true,
                userPanningEnabled: true,
                boxSelectionEnabled: false,
                autounselectify: true
            });
        });
    </script>
</body>

</html>
