<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cytoscape Graph</title>
    <!-- 保存したローカルファイルを読み込み -->
    <script src="cytoscape.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #ffffff;
        }

        #cy {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>

<body>

    <div id="cy"></div>
    <script src="graph_config.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const config = cytoscapeConfig || {};
            const configProps = config.props || {};

            // 1. エレメントデータの抽出
            let rawElements = configProps.elements || config.elements || [];

            // 2. スタイルシートの抽出と、純粋なJavaScript版への形式変換
            let rawStylesheet = configProps.stylesheet || config.stylesheet || [];
            let convertedStyle = [];

            if (Array.isArray(rawStylesheet)) {
                convertedStyle = rawStylesheet.map(item => {
                    let dashStyle = item.style || item.css || {};

                    if (typeof dashStyle === 'string') {
                        try { dashStyle = JSON.parse(dashStyle); } catch (e) { dashStyle = {}; }
                    }

                    const finalStyle = {};
                    Object.keys(dashStyle).forEach(key => {
                        let kebabKey = key.replace(/([A-Z])/g, "-$1").toLowerCase();

                        // Dash特有の「content」を、本家JSが認識できる「label」に変換
                        if (kebabKey === 'content') kebabKey = 'label';

                        finalStyle[kebabKey] = dashStyle[key];
                    });

                    // 複数クラスの空白をドットに補正
                    let cleanSelector = item.selector.trim().replace(/\s+/g, '.');

                    return {
                        selector: cleanSelector,
                        style: finalStyle
                    };
                });
            }

            // 3. グラフの描画を実行
            const cy = cytoscape({
                container: document.getElementById('cy'),
                elements: rawElements,

                // 【最重要修正】本家JavaScript版のプロパティ名は「style」です！
                style: convertedStyle,

                layout: {
                    name: 'preset'  // Python側の座標(position)を完全固定
                },
                zoomingEnabled: true,
                userZoomingEnabled: true,
                panningEnabled: true,
                userPanningEnabled: true,
                boxSelectionEnabled: false,
                autounselectify: true
            });

            // 4. 全体が綺麗に画面に収まるよう自動調整
            cy.fit(50);
        });
    </script>
</body>

</html>
