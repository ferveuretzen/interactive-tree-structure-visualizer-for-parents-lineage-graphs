<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cytoscape Graph</title>
    <!-- Cytoscape.js の読み込み -->
    <script src="cytoscape.min.js"></script>
    <style>
        /* 画面全体にグラフを表示する設定 */
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        #cy {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>

<body>

    <!-- グラフが描画されるコンテナ -->
    <div id="cy"></div>

    <!-- Pythonから出力した設定ファイルの読み込み -->
    <script src="graph_config.js"></script>

    <script>
        // グラフの初期化と描画
        document.addEventListener('DOMContentLoaded', function () {
            cytoscape({
                container: document.getElementById('cy'),

                // Python側で指定したデータをそのまま流し込む
                elements: cytoscapeConfig.props.elements,
                stylesheet: cytoscapeConfig.props.stylesheet,
                layout: cytoscapeConfig.props.layout,

                // 操作・インタラクションの設定
                zoomingEnabled: true,      // 拡大縮小を許可
                userZoomingEnabled: true,  // ユーザーのズーム操作を許可
                panningEnabled: true,      // 画面の移動を許可
                userPanningEnabled: true,  // ユーザーの画面移動を許可
                boxSelectionEnabled: false,// 複数選択は不要
                autounselectify: true      // ノードの選択状態の変化を無効化
            });
        });
    </script>
</body>

</html>
