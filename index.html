<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cytoscape グラフ表示</title>
    <style>
        /* 画面いっぱいにグラフを表示する設定 */
        html,
        body,
        #cy {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
    </style>
</head>

<body>

    <!-- グラフを表示する枠 -->
    <div id="cy"></div>

    <!-- 1. Cytoscape.js の本体ライブラリを確実に読み込む（公式CDNに変更） -->
    <script src="cytoscape.min.js"></script>

    <!-- 2. あなたの設定ファイルを読み込む -->
    <script src="graph_config.js"></script>

    <script>
        window.addEventListener('load', () => {

            if (typeof cytoscape === 'undefined') {
                console.error("Cytoscapeライブラリの読み込みに失敗しました。");
                return;
            }

            if (typeof cytoscapeConfig !== 'undefined') {
                // 1. 基本設定を合体
                const config = Object.assign({}, cytoscapeConfig, {
                    container: document.getElementById('cy')
                });

                // 2. グラフを描画して、インスタンス（cy）を受け取る
                const cy = cytoscape(config);
                console.log("グラフを描画しました");

                // ✨ 【解決策1】グラフ全体を強制的に画面にフィットさせる
                cy.fit();

                // ✨ 【解決策2】もし座標がなくて消えている場合、強制的にグリッド配置にする
                // (もし自前のレイアウトを維持したい場合は、下の5行を消してください)
                cy.layout({
                    name: 'grid', // 'cose'（自動分散）や 'circle'（円状）に変えてもOKです
                    animate: false
                }).run();

                // 画面サイズが変わったときも自動でフィットさせる
                window.addEventListener('resize', () => {
                    cy.fit();
                });

            } else {
                console.error("変数 cytoscapeConfig が見つかりません。");
            }
        });
    </script>

</body>

</html>
