<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cytoscape Graph</title>
    <!-- 保存したローカルファイルを読み込み -->
    <script src="cytoscape.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #ffffff;
        }

        #cy {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>

<body>

    <div id="cy"></div>
    <script src="graph_config.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const config = cytoscapeConfig || {};
            const configProps = config.props || {};

            // 1. エレメント（ノード・エッジ）の抽出
            let rawElements = configProps.elements || config.elements || [];

            // 2. スタイルシートの抽出と、優先度（詳細度）の強制引き上げ処理
            let rawStylesheet = configProps.stylesheet || config.stylesheet || [];
            let convertedStylesheet = [];

            if (Array.isArray(rawStylesheet)) {
                convertedStylesheet = rawStylesheet.map((item, index) => {
                    let dashStyle = item.style || item.css || {};

                    if (typeof dashStyle === 'string') {
                        try { dashStyle = JSON.parse(dashStyle); } catch (e) { dashStyle = {}; }
                    }

                    const finalStyle = {};
                    Object.keys(dashStyle).forEach(key => {
                        let kebabKey = key.replace(/([A-Z])/g, "-$1").toLowerCase();

                        // content を label に変換
                        if (kebabKey === 'content') kebabKey = 'label';

                        finalStyle[kebabKey] = dashStyle[key];
                    });

                    // 【今回の最重要ポイント：セレクタ優先度の引き上げ】
                    let cleanSelector = item.selector.trim();

                    // 空白区切りをドットに置換 (例: ".edge tt25" -> ".edge.tt25")
                    cleanSelector = cleanSelector.replace(/\s+/g, '.');

                    // 本家Cytoscape.jsの内部デフォルトスタイルに打ち勝つため、
                    // 全てのセレクタの先頭にノード/エッジ識別か、全要素ワイルドカード `*` を結合し、
                    // さらに「後から読み込まれたスタイル」として優先度を最大化します。
                    if (cleanSelector.includes('edge')) {
                        cleanSelector = 'edge' + cleanSelector;
                    } else if (cleanSelector.includes('node') || cleanSelector.includes('conn') || cleanSelector.includes('self')) {
                        cleanSelector = 'node' + cleanSelector;
                    } else {
                        cleanSelector = '*' + cleanSelector;
                    }

                    return {
                        selector: cleanSelector,
                        style: finalStyle
                    };
                });
            }

            // 3. グラフの描画を実行
            const cy = cytoscape({
                container: document.getElementById('cy'),
                elements: rawElements,
                stylesheet: convertedStylesheet, // 優先度を限界突破させたスタイル
                layout: {
                    name: 'preset'  // Python側の座標(position)をそのまま使用
                },
                zoomingEnabled: true,
                userZoomingEnabled: true,
                panningEnabled: true,
                userPanningEnabled: true,
                boxSelectionEnabled: false,
                autounselectify: true
            });

            // 4. 全体が綺麗に画面に収まるよう自動調整
            cy.fit(50);
        });
    </script>
</body>

</html>
