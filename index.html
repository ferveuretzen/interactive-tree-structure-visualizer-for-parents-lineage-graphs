<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Plotly グラフ表示</title>
    <!-- Plotly.js（グラフ描画ライブラリ）を読み込む -->
    <script src="https://plot.ly" charset="utf-8"></script>
</head>

<body>

    <!-- グラフを表示するための枠（コンテナ） -->
    <div id="my-graph" style="width:100%; height:100vh;"></div>

    <!-- 設定ファイルを読み込む -->
    <script src="graph_config.js"></script>

    <script>
        // graph_config.js 内で定義されている変数（例: data, layout）を使ってグラフを描画
        // ※変数名は graph_config.js の記述に合わせて「graphData」などに適宜変更してください
        Plotly.newPlot('my-graph', data, layout);
    </script>

</body>

</html>
