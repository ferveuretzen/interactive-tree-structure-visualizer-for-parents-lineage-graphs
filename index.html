<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cytoscape Graph</title>
    <script src="cytoscape.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #ffffff;
        }

        #cy {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>

<body>

    <div id="cy"></div>
    <script src="graph_config.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const config = cytoscapeConfig || {};
            const configProps = config.props || {};

            let rawStylesheet = configProps.stylesheet || config.stylesheet || [];
            let convertedStyle = rawStylesheet.map(item => {
                let dashStyle = item.style || item.css || {};
                const finalStyle = {};

                Object.keys(dashStyle).forEach(key => {
                    if (key === 'content') {
                        finalStyle['label'] = dashStyle[key];
                    } else {
                        finalStyle[key] = dashStyle[key];
                    }
                });

                return {
                    selector: item.selector,
                    style: finalStyle
                };
            });

            const cy = cytoscape({
                container: document.getElementById('cy'),
                elements: configProps.elements || config.elements || [],
                style: convertedStyle,
                layout: { name: 'preset' },
                zoomingEnabled: true,
                userZoomingEnabled: true,
                panningEnabled: true,
                userPanningEnabled: true,
                boxSelectionEnabled: false,
                autounselectify: true
            });

            cy.fit(50);
        });
    </script>
</body>

</html>
