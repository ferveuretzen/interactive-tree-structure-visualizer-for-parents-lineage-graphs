<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cytoscape Graph</title>
    <!-- Cytoscape.js の読み込み -->
    <script src="cytoscape.min.js"></script>
    <style>
        /* 画面全体にグラフを表示する設定 */
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        #cy {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>

<body>

    <!-- グラフが描画されるコンテナ -->
    <div id="cy"></div>

    <!-- Pythonから出力した設定ファイルの読み込み -->
    <script src="graph_config.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // 1. Python側のデータから各設定を安全に抽出
            const configProps = cytoscapeConfig.props || {};

            // 2. Dash特有の「stylesheet」の構造をJS（Cytoscape.js）の形式に変換
            let convertedStylesheet = [];
            if (Array.isArray(configProps.stylesheet)) {
                convertedStylesheet = configProps.stylesheet.map(style => {
                    // Python側の「style」はJS側では「css」または「style」として処理する
                    return {
                        selector: style.selector,
                        style: style.style || style.css || {}
                    };
                });
            }

            // 3. グラフの描画を実行
            cytoscape({
                container: document.getElementById('cy'),

                // エレメントデータをそのまま流し込む
                elements: configProps.elements || [],

                // 変換後のスタイルシートを適用（これでラベルやエッジの形状が復活します）
                stylesheet: convertedStylesheet,

                // 自動配置を防ぎ、Python側で指定した位置(position)を100%再現する
                layout: {
                    name: 'preset'
                },

                // 操作・インタラクションの設定
                zoomingEnabled: true,
                userZoomingEnabled: true,
                panningEnabled: true,
                userPanningEnabled: true,
                boxSelectionEnabled: false,
                autounselectify: true
            });
        });
    </script>
</body>

</html>
