<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cytoscape Graph</title>
    <script src="cytoscape.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #fff;
        }

        #cy {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>

<body>

    <div id="cy"></div>
    <script src="graph_config.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const config = cytoscapeConfig || {};
            const configProps = config.props || {};

            // 1. エレメント（ノード・エッジ）の抽出
            let rawElements = configProps.elements || config.elements || [];

            // 2. スタイルシートの抽出と、JavaScript（本家）向けへの完全適合化
            let rawStylesheet = configProps.stylesheet || config.stylesheet || [];
            let convertedStylesheet = [];

            if (Array.isArray(rawStylesheet)) {
                convertedStylesheet = rawStylesheet.map(item => {
                    let dashStyle = item.style || item.css || {};

                    // 文字列（JSON）だった場合のデコード処理
                    if (typeof dashStyle === 'string') {
                        try { dashStyle = JSON.parse(dashStyle); } catch (e) { dashStyle = {}; }
                    }

                    const finalStyle = {};
                    Object.keys(dashStyle).forEach(key => {
                        let kebabKey = key.replace(/([A-Z])/g, "-$1").toLowerCase();

                        // Dash特有の「content」を、本家JSが認識できる「label」に変換
                        if (kebabKey === 'content') kebabKey = 'label';

                        finalStyle[kebabKey] = dashStyle[key];
                    });

                    // 【最重要】セレクタの形式（ドットの有無）を補正
                    let cleanSelector = item.selector.trim();

                    // データ側（classes:"node"など）に合わせるため、
                    // もしセレクタが "node" や "edge" から始まっていてドットが無い場合、
                    // 先頭にドットを付与してクラスセレクタ (.node や .edge) に変換します
                    if (!cleanSelector.startsWith('.') && !cleanSelector.startsWith('#')) {
                        cleanSelector = '.' + cleanSelector;
                    }

                    // 複数クラス（例: ".edge tt25"）をJS版が認識できるようにドット繋ぎに補正
                    cleanSelector = cleanSelector.replace(/\s+/g, '.');

                    return {
                        selector: cleanSelector,
                        style: finalStyle
                    };
                });
            }

            // 3. グラフの描画を実行
            const cy = cytoscape({
                container: document.getElementById('cy'),
                elements: rawElements,
                stylesheet: convertedStylesheet, // クラスマッチを強制したスタイルシート
                layout: {
                    name: 'preset'  // 位置座標を完全固定
                },
                zoomingEnabled: true,
                userZoomingEnabled: true,
                panningEnabled: true,
                userPanningEnabled: true,
                boxSelectionEnabled: false,
                autounselectify: true
            });

            // 4. 初期表示時に全体が綺麗に画面に収まるようズームを自動調整
            cy.fit(50);
        });
    </script>


</body>

</html>
