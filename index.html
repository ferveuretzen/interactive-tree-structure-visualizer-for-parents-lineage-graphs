<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cytoscape 完全再現グラフィック</title>
    <style>
        html,
        body,
        #cy {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #fcfcfc;
        }
    </style>
</head>

<body>

    <div id="cy"></div>

    <!-- ライブラリと、新しくなった純粋な設定ファイルの読み込み -->
    <script src="cytoscape.min.js"></script>
    <script src="graph_config.js"></script>

    <script>
        window.addEventListener('load', () => {
            if (typeof cytoscape === 'undefined' || typeof cytoscapeConfig === 'undefined') {
                console.error("ライブラリ、またはデータが読み込めません。");
                return;
            }

            console.log("純粋なCytoscape設定データを読み込みました:", cytoscapeConfig);

            // 🏗️ Python側から出力された設定をベースに、表示するコンテナ（枠）だけを指定
            const cleanConfig = Object.assign({}, cytoscapeConfig, {
                container: document.getElementById('cy')
            });

            // 💡 警告対策：もしPythonのスタイル指定が「Dash用（CSS）」になっていた場合、
            // Cytoscape本体がエラーを起こすのを防ぐため、もし stylesheet が存在しなければ補完する
            if (!cleanConfig.stylesheet && cleanConfig.style && Array.isArray(cleanConfig.style)) {
                cleanConfig.stylesheet = cleanConfig.style;
                delete cleanConfig.style;
            }

            // 🗺️ レイアウトの固定設定
            // 元々座標（position）が決まっている家系図なので、強制的に 'preset'（位置固定）で描画します
            cleanConfig.layout = {
                name: 'preset'
            };

            // 🎨 グラフを描画
            const cy = cytoscape(cleanConfig);

            // 描画後、元々の配置スケールに合わせて画面中央にピタッとフィットさせる
            setTimeout(() => {
                cy.fit();
                cy.center();
            }, 100);

            console.log("元々の設定を忠実に再現して描画しました。要素数:", cy.elements().length);

            window.addEventListener('resize', () => {
                cy.resize();
                cy.fit();
            });
        });
    </script>

</body>

</html>
