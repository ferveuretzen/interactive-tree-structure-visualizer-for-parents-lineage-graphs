<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plotly グラフ表示</title>
    <!-- 1. まずPlotlyのライブラリを確実に読み込む -->
    <script src="https://plot.ly" charset="utf-8"></script>
</head>

<body>

    <div id="my-graph" style="width:100%; height:100vh;"></div>

    <!-- 2. 次にデータを読み込む -->
    <script src="graph_config.js"></script>

    <script>
        // 画面の準備と、データの読み込みが両方終わってから描画する
        window.addEventListener('DOMContentLoaded', () => {
            if (typeof data !== 'undefined' && typeof layout !== 'undefined') {
                Plotly.newPlot('my-graph', data, layout);
            } else {
                console.log("変数名が data / layout ではない可能性があります");
            }
        });
    </script>

</body>

</html>
