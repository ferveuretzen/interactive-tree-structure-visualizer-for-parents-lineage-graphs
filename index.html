<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Pages - Cytoscape Graph</title>

    <!-- 1. ネットワーク図を描画するためのライブラリを読み込み -->
    <script src="https://cloudflare.com"></script>

    <!-- 2. PythonからダンプしたJSファイルを読み込み（github.io上で正常に連動します） -->
    <script src="graph_config.js"></script>

    <style>
        /* 画面全体にグラフを広げるためのスタイル設定 */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #ffffff;
        }

        #cy {
            position: absolute;
            top: 0;
            left: 0;
            /* 万が一Python側でサイズ指定が漏れていた場合の保険 */
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>

<body>

    <!-- 3. グラフを表示するコンテナ要素 -->
    <div id="cy"></div>

    <script>
        // 4. HTMLと外部JS（graph_config.js）の読み込みが完全に終わったら実行
        window.addEventListener('load', () => {

            // ダンプデータ（cytoscapeConfig.props）に安全にアクセス
            if (typeof cytoscapeConfig === 'undefined' || !cytoscapeConfig.props) {
                console.error("エラー: graph_config.js が正しく読み込めていないか、データ構造が異なります。");
                return;
            }

            const config = cytoscapeConfig.props;
            const cyContainer = document.getElementById('cy');

            if (config.style) {
                Object.assign(cyContainer.style, config.style);
            }

            var cy = cytoscape({
                container: cyContainer,
                elements: config.elements,
                style: config.stylesheet,
                layout: config.layout
            });

            if (config.layout) {
                cy.layout(config.layout).run();
            }
            cy.fit();
        });
    </script>
</body>

</html>
